<div class="referentiel-container">
  <div class="referentiel-header">
    <h2>Référentiels</h2>

    <!-- Toggle Lieux / Types -->
    <div class="toggle-container">
      <input type="radio" id="lieux" name="section" value="0"
        [checked]="sectionActive === 0"
        (change)="changerSection(0)">
      <label for="lieux" class="toggle-box">Lieux</label>

      <input type="radio" id="types" name="section" value="1"
        [checked]="sectionActive === 1"
        (change)="changerSection(1)">
      <label for="types" class="toggle-box">Types</label>
    </div>
  </div>

  <!-- Section active uniquement -->
  <div class="section">
    <div *ngIf="sectionAffichee.chargement" class="chargement">
      Chargement...
    </div>

    <ul *ngIf="!sectionAffichee.chargement" class="liste">
      <li *ngFor="let item of sectionAffichee.items" class="item">

        <ng-container *ngIf="sectionAffichee.itemEnEdition !== item.id">
          <span class="nom">{{ item.Nom }}</span>
          <div class="actions">
            <button class="btn-edit" (click)="activerEdition(sectionAffichee, item)">Renommer</button>
            <button class="btn-delete" (click)="demanderSuppression(sectionAffichee.collection, item)">Supprimer</button>
          </div>
        </ng-container>

        <ng-container *ngIf="sectionAffichee.itemEnEdition === item.id">
          <input
            class="input-edit"
            [(ngModel)]="sectionAffichee.nomEdition"
            (keyup.enter)="sauvegarderEdition(sectionAffichee)"
            (keyup.escape)="annulerEdition(sectionAffichee)"
            autofocus />
          <div class="actions">
            <button class="btn-save" (click)="sauvegarderEdition(sectionAffichee)">✅</button>
            <button class="btn-cancel" (click)="annulerEdition(sectionAffichee)">❌</button>
          </div>
        </ng-container>

      </li>
    </ul>

    <div *ngIf="!sectionAffichee.chargement" class="ajout">
      <input
        class="input-ajout"
        [(ngModel)]="sectionAffichee.nouveauNom"
        placeholder="Nouveau nom..."
        (keyup.enter)="ajouter(sectionAffichee)" />
      <button class="btn-add" (click)="ajouter(sectionAffichee)">+ Ajouter</button>
    </div>
  </div>
</div>

<!-- Popup suppression -->
<div class="overlay" *ngIf="popupSuppression.visible">
  <div class="popup">
    <h4>Confirmer la suppression</h4>
    <p>Êtes-vous sûr de vouloir supprimer <strong>{{ popupSuppression.nom }}</strong> ?</p>
    <p class="popup-warning">⚠️ Cette action est irréversible.</p>
    <div class="popup-actions">
      <button class="btn-cancel" (click)="annulerSuppression()">Annuler</button>
      <button class="btn-delete" (click)="confirmerSuppression()">Supprimer</button>
    </div>
  </div>
</div>
